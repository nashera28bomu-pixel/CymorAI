<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>CymorAI</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Elfsight Script -->
<script src="https://static.elfsight.com/platform/platform.js" async></script>

<style>

:root{
    --neon-green:#22c55e;
    --neon-blue:#38bdf8;
    --bg:#020617;
    --glass:rgba(15,23,42,0.55);
    --border:rgba(255,255,255,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Outfit',sans-serif;
    background:radial-gradient(circle at top,#0f172a 0%,#020617 60%);
    color:white;
    position:relative;
}

/* Background Glow */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(56,189,248,0.12);
    filter:blur(120px);
    top:-150px;
    left:-120px;
    animation:floatGlow 10s infinite alternate ease-in-out;
    z-index:0;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(34,197,94,0.10);
    filter:blur(120px);
    bottom:-120px;
    right:-120px;
    animation:floatGlow2 12s infinite alternate ease-in-out;
    z-index:0;
}

@keyframes floatGlow{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(60px);
    }
}

@keyframes floatGlow2{
    from{
        transform:translateX(0px);
    }
    to{
        transform:translateX(-60px);
    }
}

/* Floating Background Text */
.floating-text{
    position:absolute;
    font-size:8rem;
    font-weight:800;
    color:rgba(255,255,255,0.03);
    user-select:none;
    pointer-events:none;
    z-index:0;
    animation:moveAround 15s infinite alternate ease-in-out;
}

@keyframes moveAround{
    0%{
        transform:translate(-20px,0px) rotate(0deg);
    }

    100%{
        transform:translate(20px,-50px) rotate(5deg);
    }
}

/* Main App Container */
.app-card{
    width:100%;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--glass);
    backdrop-filter:blur(25px);
    position:relative;
    z-index:2;
    overflow:hidden;
}

/* Header */
header{
    padding:18px;
    background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:relative;
    z-index:10;
}

.header-title{
    font-size:28px;
    font-weight:800;
    letter-spacing:2px;
    color:var(--neon-green);
    text-shadow:0 0 18px var(--neon-green);
}

.header-sub{
    margin-top:4px;
    font-size:13px;
    color:var(--neon-blue);
}

/* Online Status */
.status{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#cbd5e1;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--neon-green);
    box-shadow:0 0 10px var(--neon-green);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.3);
    }

    100%{
        transform:scale(1);
    }
}

/* AI Banner */
.ai-banner{
    margin:10px;
    padding:12px;
    border-radius:16px;
    background:linear-gradient(
        135deg,
        rgba(34,197,94,0.15),
        rgba(56,189,248,0.15)
    );
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
    font-size:13px;
    color:#e2e8f0;
    animation:glowCard 3s infinite alternate;
    z-index:5;
}

@keyframes glowCard{
    from{
        box-shadow:0 0 15px rgba(34,197,94,0.08);
    }

    to{
        box-shadow:0 0 25px rgba(56,189,248,0.15);
    }
}

/* Chat Area */
.chat-container{
    flex:1;
    width:100%;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* Elfsight Fullscreen Fix */
.elfsight-app-7302c2be-363a-4d2a-8536-04b3498e8cf2{
    width:100%;
    height:100%;
    flex:1;
}

/* Footer */
.footer{
    padding:10px;
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,0.55);
    background:rgba(255,255,255,0.03);
    border-top:1px solid rgba(255,255,255,0.05);
    z-index:10;
}

.footer span{
    color:var(--neon-blue);
    font-weight:600;
}

/* Scrollbar */
::-webkit-scrollbar{
    width:4px;
}

::-webkit-scrollbar-thumb{
    background:var(--neon-blue);
    border-radius:20px;
}

/* Mobile Optimization */
@media(max-width:768px){

    .floating-text{
        font-size:4rem;
    }

    .header-title{
        font-size:22px;
    }

    .header-sub{
        font-size:12px;
    }

    .footer{
        font-size:10px;
        padding:8px;
    }

    .ai-banner{
        margin:8px;
        padding:10px;
        font-size:12px;
    }
}

</style>
</head>

<body>

<!-- Floating Background Text -->
<div class="floating-text" style="top:10%; left:5%;">
    CYMOR
</div>

<div class="floating-text" style="bottom:8%; right:5%;">
    AI
</div>

<!-- Main App -->
<div class="app-card">

    <!-- Header -->
    <header>

        <div class="header-title">
            CYMOR AI
        </div>

        <div class="header-sub">
            Elite Intelligence v1.0
        </div>

        <div class="status">
            <div class="dot"></div>
            ONLINE
        </div>

    </header>

    <!-- AI Banner -->
    <div class="ai-banner">
        🚀 Welcome to the future of intelligence powered by CymorTechServices.
    </div>

    <!-- Chat Area -->
    <div class="chat-container">

        <!-- Elfsight AI Widget -->
        <div
            class="elfsight-app-7302c2be-363a-4d2a-8536-04b3498e8cf2"
            data-elfsight-app-lazy>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        Site made by
        <span>Legendary Smiley Cymor</span>
        | © CymorTechServices2026
    </div>

</div>

<script>

/* Dynamic Greeting Animation */
const greetings = [
    "⚡ Elite AI systems initialized...",
    "🧠 CymorAI neural systems active...",
    "🚀 Ready to assist globally...",
    "🌍 Connected to advanced intelligence..."
];

let index = 0;

setInterval(() => {

    document.querySelector(".ai-banner").innerHTML = greetings[index];

    index = (index + 1) % greetings.length;

}, 4000);

/* Fullscreen Mobile Keyboard Fix */
function setFullHeight(){

    document.body.style.height = window.innerHeight + "px";

}

window.addEventListener("load", setFullHeight);

window.addEventListener("resize", setFullHeight);

/* Smooth Startup Animation */
window.addEventListener("load", () => {

    document.querySelector(".app-card").style.opacity = "1";

});

</script>

</body>
</html>
